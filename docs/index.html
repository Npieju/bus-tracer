<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>バストレーサー | 固定ルート接近ビュー</title>
    <meta
      name="description"
      content="固定ルートの神奈中バス接近情報を5分ごとに更新するページ。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>

      <main class="layout">
        <section class="hero panel">
          <p class="eyebrow">神奈中バストレーサー</p>
          <h1>固定ルート <span>-></span> 接近ビュー</h1>
          <div class="hero-status-block">
            <div class="metric-card emphasis hero-status-card">
              <div class="metric-label">現在の状態</div>
              <div class="metric-value" id="status-message">読み込み中...</div>
              <div class="pill" id="status-pill">更新中</div>
              <div class="quick-peek-grid hero-quick-peek-grid" id="quick-peek-grid">
                <article class="quick-peek-card hero-quick-peek-card">
                  <div class="quick-peek-label">次の便</div>
                  <div class="quick-peek-time" id="quick-peek-next-time">--:--</div>
                  <div class="quick-peek-route" id="quick-peek-next-route">--</div>
                  <div class="quick-peek-meta" id="quick-peek-next-meta">--</div>
                </article>
                <article class="quick-peek-card hero-quick-peek-card subdued">
                  <div class="quick-peek-label">次の次の便</div>
                  <div class="quick-peek-time" id="quick-peek-later-time">--:--</div>
                  <div class="quick-peek-route" id="quick-peek-later-route">--</div>
                  <div class="quick-peek-meta" id="quick-peek-later-meta">--</div>
                </article>
              </div>
            </div>
          </div>

          <div class="direction-switch" id="direction-switch" aria-label="表示方向の切替"></div>
          <div class="hero-meta-strip" aria-label="取得メタ情報">
            <span class="hero-meta-item"><span class="hero-meta-label">取得</span><span class="hero-meta-value" id="updated-at">--</span></span>
            <span class="hero-meta-item"><span class="hero-meta-label">ソース</span><span class="hero-meta-value" id="source-updated">--</span></span>
            <span class="hero-meta-item"><span class="hero-meta-label">便数</span><span class="hero-meta-value" id="journey-count">--</span></span>
            <span class="hero-meta-item"><span class="hero-meta-label">再取得</span><span class="hero-meta-value" id="countdown">--:--</span></span>
          </div>
        </section>

        <section class="route-strip panel">
          <div class="route-strip-head">
            <div class="route-direction-label" id="route-direction-label">順方向</div>
          </div>
          <div class="route-strip-body">
            <div>
              <div class="route-label">乗車</div>
              <div class="route-stop" id="from-stop">出発停留所</div>
            </div>
            <div class="route-arrow">→</div>
            <div>
              <div class="route-label">降車</div>
              <div class="route-stop" id="to-stop">目的停留所</div>
            </div>
          </div>
        </section>

        <section class="next-journey panel" id="next-journey-section">
          <div class="section-head">
            <h2>次の便</h2>
            <span class="section-note" id="next-journey-note">--</span>
          </div>
          <div id="overview-text" class="overview-text"></div>
          <div class="arrival-summary" id="arrival-summary">
            <div class="arrival-box timetable">
              <div class="arrival-label">時刻表上の到着</div>
              <div class="arrival-time" id="scheduled-arrival-time">--:--</div>
            </div>
            <div class="arrival-box delay">
              <div class="arrival-label">遅れ見込み</div>
              <div class="arrival-time" id="delay-minutes">--</div>
            </div>
            <div class="arrival-box expected">
              <div class="arrival-label">実際の到着見込み</div>
              <div class="arrival-time" id="expected-arrival-time">--:--</div>
            </div>
          </div>
          <div id="next-journey">データを読んでいます...</div>
        </section>

        <section class="journey-list panel" id="journey-list-section">
          <div class="section-head">
            <h2>このあと</h2>
            <span class="section-note" id="journey-count-inline">--</span>
          </div>
          <div class="journey-grid" id="journey-grid"></div>
        </section>

        <section class="notes panel" id="notes-section">
          <div class="section-head">
            <h2>案内・補足</h2>
          </div>
          <ul class="notice-list" id="notice-list">
            <li>データを読んでいます...</li>
          </ul>
        </section>

        <section class="details panel">
          <div class="section-head">
            <h2>取得内容</h2>
            <a id="source-link" href="https://real.kanachu.jp/pc/top" target="_blank" rel="noreferrer">元サイトを開く</a>
          </div>
          <details class="raw-details">
            <summary>抽出済みテキストを開く</summary>
            <ul class="detail-list" id="detail-list">
              <li>データを読んでいます...</li>
            </ul>
          </details>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
