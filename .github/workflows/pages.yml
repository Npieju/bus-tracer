name: Deploy GitHub Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - external-refresh
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
      - master
    paths:
      - docs/**
      - scripts/**
      - .github/workflows/pages.yml
      - README.md

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    outputs:
      should_deploy: ${{ steps.publish_plan.outputs.should_deploy }}
      skip_reason: ${{ steps.publish_plan.outputs.skip_reason }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name || github.event.repository.default_branch }}
          token: ${{ secrets.PAGES_PUBLISH_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Capture committed status JSON
        run: |
          git show HEAD:docs/data/status.json > /tmp/committed-status.json || true

      - name: Generate bus status JSON
        run: python scripts/fetch_bus_data.py --output docs/data/status.json

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("docs/data/status.json").read_text(encoding="utf-8"))
          assert data["schemaVersion"] == 2
          assert data["status"] in {"ok", "partial", "error"}
          assert data["directionOrder"] == ["forward", "reverse"]
          forward = data["directions"]["forward"]
          reverse = data["directions"]["reverse"]
          assert forward["route"]["fromStop"]["id"] == "16240"
          assert forward["route"]["toStop"]["id"] == "16244"
          assert reverse["route"]["fromStop"]["id"] == "16244"
          assert reverse["route"]["toStop"]["id"] == "16240"
          assert isinstance(forward["details"], list)
          assert isinstance(reverse["details"], list)
          print(json.dumps({
              "status": data["status"],
              "message": data["message"],
              "fetchedAt": data["fetchedAt"],
          }, ensure_ascii=False))
          PY

      - name: Detect meaningful snapshot changes
        id: change_assessment
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def strip_fetched_at(value):
              if isinstance(value, dict):
                  return {
                      key: strip_fetched_at(item)
                      for key, item in value.items()
                      if key != "fetchedAt"
                  }
              if isinstance(value, list):
                  return [strip_fetched_at(item) for item in value]
              return value

          current_path = Path("docs/data/status.json")
          previous_path = Path("/tmp/committed-status.json")

          current = json.loads(current_path.read_text(encoding="utf-8"))
          previous_exists = previous_path.exists() and previous_path.stat().st_size > 0
          previous = json.loads(previous_path.read_text(encoding="utf-8")) if previous_exists else None
          should_commit = (not previous_exists) or (strip_fetched_at(previous) != strip_fetched_at(current))

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"should_commit={'true' if should_commit else 'false'}\n")
          PY

      - name: Commit refreshed status JSON
        if: (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && steps.change_assessment.outputs.should_commit == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.PAGES_PUBLISH_TOKEN }}@github.com/${{ github.repository }}.git"
          git add docs/data/status.json
          git commit -m "Update live bus snapshot"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Decide publish plan
        id: publish_plan
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          event_name = "${{ github.event_name }}"
          should_commit = "${{ steps.change_assessment.outputs.should_commit }}" == "true"

          should_deploy = True
          skip_reason = ""

          if event_name in {"schedule", "repository_dispatch"}:
              should_deploy = False
              if should_commit:
                  skip_reason = "snapshot committed to the default branch; the resulting push run will deploy"
              else:
                  skip_reason = "no meaningful snapshot change beyond fetchedAt; skipping commit and deploy"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"should_deploy={'true' if should_deploy else 'false'}\n")
              handle.write(f"skip_reason={skip_reason}\n")
          PY

      - name: Write workflow summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          data = json.loads(Path("docs/data/status.json").read_text(encoding="utf-8"))
          print("## Bus status snapshot")
          print()
          print("- event: ${{ github.event_name }}")
          print(f"- status: {data['status']}")
          print(f"- message: {data['message']}")
          print(f"- fetchedAt: {data['fetchedAt']}")
          print(f"- should commit: ${{ steps.change_assessment.outputs.should_commit }}")
          print(f"- should deploy: ${{ steps.publish_plan.outputs.should_deploy }}")
          skip_reason = "${{ steps.publish_plan.outputs.skip_reason }}"
          if skip_reason:
              print(f"- skip reason: {skip_reason}")
          for key in data["directionOrder"]:
              direction = data["directions"][key]
              label = direction["direction"]["label"]
              print(f"- {label}: {direction['status']} / {direction['message']}")
          PY

      - name: Configure Pages
        if: steps.publish_plan.outputs.should_deploy == 'true'
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        if: steps.publish_plan.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.should_deploy == 'true'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
